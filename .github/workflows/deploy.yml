name: Deploy Backend

on:
  push:
    branches:
      - main     # → dev (single env for now, add staging/prod branches later)

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set environment
        id: env
        run: |
          if   [[ "${{ github.ref_name }}" == "main" ]];    then echo "env=dev"     >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref_name }}" == "staging" ]]; then echo "env=staging" >> $GITHUB_OUTPUT
          else                                                    echo "env=prod"    >> $GITHUB_OUTPUT
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Setup Python (SAM CLI)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install SAM CLI
        run: pip install aws-sam-cli

      - name: Install esbuild
        run: npm install -g esbuild

      - name: SAM build
        run: sam build --config-file samconfig.toml --template infra/template.yaml

      - name: SAM deploy
        run: sam deploy --config-env ${{ steps.env.outputs.env }} --config-file samconfig.toml --no-confirm-changeset
